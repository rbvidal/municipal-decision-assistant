services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mda-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: municipal_decision_assistant
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mda-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: mda-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cognitera.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mda-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mda-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - mda-network

  neo4j:
    image: neo4j:5-community
    container_name: mda-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - mda-network
    profiles:
      - graph

volumes:
  postgres_data:
  qdrant_storage:
  neo4j_data:

networks:
  mda-network:
    driver: bridge
