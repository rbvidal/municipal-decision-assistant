# ──────────────────────────────────────────────────────────
# DEVELOPMENT PROFILE — NOT FOR PRODUCTION
# Contains safe defaults for local development.
# Activate with: --spring.profiles.active=dev
# ──────────────────────────────────────────────────────────

logging:
  level:
    org.springframework.security: TRACE

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/municipal_decision_assistant
    username: platform
    password: platform

management:
  tracing:
    sampling:
      probability: 0

platform:
  auth:
    jwt-secret: dev-secret-change-in-production-use-at-least-32-bytes
  search:
    qdrant:
      enabled: true
  # Neo4j defaults from application.yml (neo4j/password@localhost:7687)
