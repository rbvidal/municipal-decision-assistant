<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" href="data:,">
</head>
<body>
<nav th:fragment="nav" class="navbar">
    <div class="app-shell">
        <a class="navbar-brand" th:href="@{/home}">
            <span class="brand-accent">KVA</span>
            <span>Kommunaler Verwaltungsassistent</span>
        </a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/home}" th:classappend="${#strings.startsWith(currentUri, '/home') || currentUri == '/' || #strings.startsWith(currentUri, '/dashboard')} ? 'active'"><th:block th:text="#{nav.home}">Startseite</th:block></a>
            <a class="nav-link" th:href="@{/cases}" th:classappend="${#strings.startsWith(currentUri, '/cases')} ? 'active'"><th:block th:text="#{nav.cases}">Meine Vorgange</th:block></a>
            <a class="nav-link" th:href="@{/decision}" th:classappend="${#strings.startsWith(currentUri, '/decision') || #strings.startsWith(currentUri, '/ai') || #strings.startsWith(currentUri, '/decision-assistant')} ? 'active'"><th:block th:text="#{nav.decision}">Neue Entscheidung</th:block></a>
            <a class="nav-link" th:href="@{/regulations}" th:classappend="${#strings.startsWith(currentUri, '/regulations') || #strings.startsWith(currentUri, '/knowledge')} ? 'active'"><th:block th:text="#{nav.regulations}">Vorschriften & Verfahren</th:block></a>
            <a class="nav-link" th:href="@{/documents}" th:classappend="${#strings.startsWith(currentUri, '/documents')} ? 'active'"><th:block th:text="#{nav.documents}">Dokumente</th:block></a>
            <a class="nav-link" th:href="@{/admin}" th:classappend="${#strings.startsWith(currentUri, '/admin') || #strings.startsWith(currentUri, '/graph') || #strings.startsWith(currentUri, '/analytics') || #strings.startsWith(currentUri, '/workspaces') || #strings.startsWith(currentUri, '/audit') || #strings.startsWith(currentUri, '/jobs') || #strings.startsWith(currentUri, '/chunks') || #strings.startsWith(currentUri, '/search')} ? 'active'"><th:block th:text="#{nav.admin}">Verwaltung</th:block></a>
        </div>
        <div class="d-flex align-items-center gap-8">
            <div class="dropdown">
                <button class="btn btn-ghost btn-sm" type="button" data-bs-toggle="dropdown" style="color:var(--gray-400)">
                    <span th:text="${#locale.language == 'en' ? 'EN' : 'DE'}">DE</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{${currentUri}(lang=de)}">Deutsch</a></li>
                    <li><a class="dropdown-item" th:href="@{${currentUri}(lang=en)}">English</a></li>
                </ul>
            </div>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-ghost btn-sm" type="submit" style="color:var(--gray-400)"><th:block th:text="#{nav.logout}">Abmelden</th:block></button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</nav>
</body>
</html>
