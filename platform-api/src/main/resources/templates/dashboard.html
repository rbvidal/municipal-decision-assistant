<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{dashboard.title}">Dashboard — Municipal Decision Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="app-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3" th:text="#{dashboard.title}">Dashboard</h1>
        <div class="dropdown">
            <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                🌐 <th:block th:text="#{language.english}">Language</th:block>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" th:href="@{/dashboard(lang=en)}">🇬🇧 <th:block th:text="#{language.english}">English</th:block></a></li>
                <li><a class="dropdown-item" th:href="@{/dashboard(lang=de)}">🇩🇪 <th:block th:text="#{language.german}">Deutsch</th:block></a></li>
                <li><a class="dropdown-item" th:href="@{/dashboard(lang=fr)}">🇫🇷 <th:block th:text="#{language.french}">Français</th:block></a></li>
            </ul>
        </div>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-4"><div class="metric"><span th:text="#{dashboard.documents}">Documents</span><strong th:text="${documentCount}">0</strong></div></div>
        <div class="col-6 col-md-4"><div class="metric"><span th:text="#{dashboard.ready}">Ready</span><strong th:text="${readyDocumentCount}">0</strong></div></div>
        <div class="col-6 col-md-4"><div class="metric"><span th:text="#{dashboard.ingestionJobs}">Ingestion jobs</span><strong th:text="${ingestionJobCount}">0</strong></div></div>


    </div>
    <h2 class="h5" th:text="#{dashboard.recentAudits}">Recent audit events</h2>
    <table class="table table-sm table-striped bg-white">
        <thead><tr><th th:text="#{dashboard.time}">Time</th><th th:text="#{dashboard.type}">Type</th><th th:text="#{dashboard.actor}">Actor</th><th th:text="#{dashboard.correlation}">Correlation</th></tr></thead>
        <tbody>
        <tr th:each="event : ${recentAudits}">
            <td th:text="${#temporals.format(event.timestamp(), 'dd.MM.yyyy HH:mm', #locale)}"></td>
            <td th:text="${event.eventType()}"></td>
            <td th:text="${event.actorId()}"></td>
            <td class="trace" th:text="${event.correlationId()}"></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
