<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'Error ' + ${status}">Error — Municipal Decision Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="app-shell">
    <div class="d-flex align-items-center mb-3">
        <h1 class="h3 me-2" th:text="'Error ' + ${status}">Error</h1>
        <span class="badge" th:classappend="${status} >= 500 ? 'bg-danger' : 'bg-warning text-dark'"
              th:text="${error}">Internal Server Error</span>
    </div>

    <div class="alert alert-danger">
        <p class="mb-1"><strong th:text="${message}">Error message</strong></p>
        <small class="text-muted" th:if="${requestUri} != null">
            Request: <code th:text="${requestUri}">/path</code>
        </small>
    </div>

    <div class="card" th:if="${stacktrace} != null">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Stacktrace</span>
            <button class="btn btn-sm btn-outline-secondary" type="button"
                    data-bs-toggle="collapse" data-bs-target="#stacktraceBlock"
                    aria-expanded="false" aria-controls="stacktraceBlock">
                Show / Hide
            </button>
        </div>
        <div class="collapse" id="stacktraceBlock">
            <div class="card-body">
                <pre class="text-danger mb-0" style="font-size:0.8rem; white-space:pre-wrap; word-break:break-word"
                     th:text="${stacktrace}">stacktrace</pre>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/dashboard}" class="btn btn-primary" th:text="#{nav.dashboard}">Back to Dashboard</a>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
