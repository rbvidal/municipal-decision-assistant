<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{login.title}">Login — Municipal Decision Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<main class="app-shell py-5">
    <section class="metric mx-auto" style="max-width: 420px;">
        <h1 class="h4 mb-3" th:text="#{login.title}">Login</h1>
        <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.invalidCredentials}">Invalid credentials.</div>
        <div th:if="${param.registered}" class="alert alert-success" th:text="#{login.registrationComplete}">Registration complete.</div>
        <div th:if="${param.logout}" class="alert alert-secondary" th:text="#{login.loggedOut}">Logged out.</div>
        <form th:action="@{/login}" method="post">
            <label class="form-label" th:text="#{login.email}">Email</label>
            <input name="username" class="form-control mb-3" autocomplete="username">
            <label class="form-label" th:text="#{login.password}">Password</label>
            <input name="password" type="password" class="form-control mb-3" autocomplete="current-password">
            <button class="btn btn-primary w-100" type="submit" th:text="#{login.login}">Login</button>
        </form>
        <a th:href="@{/register}" class="d-block mt-3" th:text="#{login.createAccount}">Create account</a>
    </section>
</main>
</body>
</html>
