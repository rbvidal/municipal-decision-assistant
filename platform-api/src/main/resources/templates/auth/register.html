<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{register.title}">Register — Municipal Decision Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<main class="app-shell py-5">
    <section class="metric mx-auto" style="max-width: 420px;">
        <h1 class="h4 mb-3" th:text="#{register.title}">Register</h1>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}">Error</div>
        <form th:action="@{/register}" method="post">
            <label class="form-label" th:text="#{register.email}">Email</label>
            <input name="email" class="form-control mb-3" autocomplete="email">
            <label class="form-label" th:text="#{register.displayName}">Display name</label>
            <input name="displayName" class="form-control mb-3">
            <label class="form-label" th:text="#{register.password}">Password</label>
            <input name="password" type="password" class="form-control mb-3" autocomplete="new-password">
            <button class="btn btn-primary w-100" type="submit" th:text="#{register.createAccount}">Create account</button>
        </form>
        <a th:href="@{/login}" class="d-block mt-3" th:text="#{register.backToLogin}">Back to login</a>
    </section>
</main>
</body>
</html>
