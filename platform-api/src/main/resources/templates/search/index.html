<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{search.title}">Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="app-shell">
    <h1 class="h3 mb-3" th:text="#{search.title}">Document Search</h1>
    <form method="get" class="metric mb-4">
        <div class="row g-2">
            <div class="col-md-5"><input name="query" th:value="${form.query()}" class="form-control" th:placeholder="#{search.placeholder}"></div>
            <div class="col-md-2"><select name="mode" class="form-select"><option th:each="m : ${modes}" th:value="${m}" th:text="${m}"></option></select></div>
            <div class="col-md-2"><select name="documentType" class="form-select"><option value="" th:text="#{search.anyType}">Any type</option><option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option></select></div>
            <div class="col-md-4"><input name="category" th:value="${form.category()}" class="form-control" th:placeholder="#{search.category}"></div>
            <div class="col-md-4"><input name="tag" th:value="${form.tag()}" class="form-control" th:placeholder="#{search.tag}"></div>
            <div class="col-md-4"><button class="btn btn-primary w-100" type="submit" th:text="#{search.search}">Search</button></div>
        </div>
    </form>
    <section th:if="${results != null}">
        <h2 class="h5"><th:block th:text="#{search.results}">Results</th:block> <span th:text="${results.totalElements()}"></span></h2>
        <div th:each="result : ${results.results()}" class="metric mb-2">
            <div class="d-flex justify-content-between align-items-start">
                <span class="citation-link"
                      th:attr="data-doc-id=${result.chunk().documentId()},data-chunk-id=${result.chunk().chunkId()}"
                      th:text="${result.citation().title()}"></span>
                <span class="small text-secondary">
                    <span th:if="${result.intent() != 'GENERAL'}" class="badge bg-info text-dark me-1" th:text="${result.intent()}"></span>
                    <span>score=<strong th:text="${#numbers.formatDecimal(result.score(), 1, 3)}"></strong></span>
                    <span class="ms-2">kw=<span th:text="${#numbers.formatDecimal(result.keywordScore(), 1, 3)}"></span></span>
                    <span class="ms-1">vec=<span th:text="${#numbers.formatDecimal(result.vectorScore(), 1, 3)}"></span></span>
                    <span th:if="${result.rerankScore() > 0}" class="ms-1">rerank=<span th:text="${#numbers.formatDecimal(result.rerankScore(), 1, 3)}"></span></span>
                </span>
            </div>
            <p th:text="${result.text()}"></p>
            <div class="trace">
                <span class="citation-link" th:attr="data-doc-id=${result.chunk().documentId()},data-chunk-id=${result.chunk().chunkId()}" style="font-size:11px">
                    chunk=<span th:text="${result.chunk().chunkId()}"></span>
                </span>
                <span> doc=<span th:text="${result.chunk().documentId()}"></span></span>
                <span> v=<span th:text="${result.chunk().documentVersion()}"></span></span>
                <span> strategy=<span th:text="${result.retrievalStrategy()}"></span></span>
            </div>
        </div>
    </section>
</main>
</body>
</html>
