<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{chunks.title}">Chunk Inspection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="app-shell">
    <h1 class="h3 mb-3" th:text="#{chunks.title}">Chunk Inspection</h1>
    <form method="get" class="row g-2 mb-3">
        <div class="col-md-10"><input name="documentId" class="form-control" th:placeholder="#{chunks.documentId}"></div>
        <div class="col-md-2"><button class="btn btn-secondary w-100" type="submit" th:text="#{chunks.inspect}">Inspect</button></div>
    </form>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${currentDocumentId != null and !currentDocumentId.isEmpty() and #lists.isEmpty(chunks) and error == null}" class="alert alert-warning">No chunks found for document <code th:text="${currentDocumentId}"></code>. The document may not have been indexed yet.</div>
    <table class="table table-sm table-striped bg-white" th:if="${!#lists.isEmpty(chunks)}">
        <thead><tr><th th:text="#{chunks.table.chunk}">Chunk</th><th th:text="#{chunks.table.document}">Document</th><th th:text="#{chunks.table.version}">Version</th><th th:text="#{chunks.table.page}">Page</th><th th:text="#{chunks.table.offsets}">Offsets</th><th th:text="#{chunks.table.text}">Text</th></tr></thead>
        <tbody>
        <tr th:each="chunk : ${chunks}">
            <td class="trace" th:text="${chunk.id()}"></td>
            <td class="trace" th:text="${chunk.documentId()}"></td>
            <td th:text="${chunk.documentVersion()}"></td>
            <td th:text="${chunk.position().pageNumber() != null ? chunk.position().pageNumber() : '-'}"></td>
            <td class="trace" th:text="${chunk.position().startOffset() != null ? chunk.position().startOffset() + '-' + chunk.position().endOffset() : '-'}"></td>
            <td th:text="${chunk.text()}"></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${currentDocumentId == null or currentDocumentId.isEmpty()}" class="text-muted">Enter a document UUID above to inspect its chunks.</p>
    <nav class="mt-3">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/chunks(documentId=${currentDocumentId},page=${currentPage - 1})}" th:text="#{common.previous}">Previous</a>
            </li>
            <li class="page-item disabled"><span class="page-link" th:text="#{common.page} + ' ' + ${currentPage + 1}">Page 1</span></li>
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/chunks(documentId=${currentDocumentId},page=${currentPage + 1})}" th:text="#{common.next}">Next</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
