<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Workspaces</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="app-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Workspaces</h1>
        <a th:href="@{/workspaces/new}" class="btn btn-primary">New Workspace</a>
    </div>
    <div th:if="${workspaces.empty}" class="text-center py-5">
        <p class="text-muted mb-3">No workspaces yet</p>
        <a th:href="@{/workspaces/new}" class="btn btn-primary btn-lg">Start Your First Workspace</a>
    </div>
    <div class="row g-3" th:if="${!workspaces.empty}">
        <div class="col-md-4" th:each="w : ${workspaces}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${w.name() != null ? w.name() : w.id()}">WORKSPACE</h5>
                    <span class="badge" th:classappend="${w.status().name() == 'ACTIVE'} ? 'bg-success' : (${w.status().name() == 'DRAFT'} ? 'bg-warning text-dark' : 'bg-secondary')" th:text="${w.status()}">DRAFT</span>
                    <hr>
                    <p class="mb-1"><small class="text-muted">Type:</small> <span th:text="${w.workspaceType().replace('_',' ')}">General</span></p>
                    <p class="mb-1"><small class="text-muted">Description:</small> <span th:text="${w.description() != null ? w.description() : '-'}">-</span></p>
                    <p class="mb-1"><small class="text-muted">Phase:</small> <span th:text="${w.phase() != null ? w.phase().name().replace('_',' ') : '-'}">-</span></p>
                    <p class="mb-0"><small class="text-muted">Documents:</small> <span th:text="${#lists.size(w.documents())}">0</span></p>
                </div>
                <div class="card-footer bg-transparent">
                    <a th:href="@{/workspaces/{id}/wizard(id=${w.id()})}" class="btn btn-sm btn-outline-primary">Open Wizard</a>
                    <a th:href="@{/workspaces/{id}/workspace(id=${w.id()})}" class="btn btn-sm btn-outline-secondary">Workspace</a>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
