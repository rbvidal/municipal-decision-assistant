<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'Workspace ' + ${workspace.name()}">Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="app-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3" th:text="${workspace.name() != null ? workspace.name() : workspace.id()}">WORKSPACE</h1>
        <div>
            <a th:href="@{/workspaces/{id}/wizard(id=${workspace.id()})}" class="btn btn-primary btn-sm">Wizard</a>
            <a th:href="@{/workspaces/{id}/workspace(id=${workspace.id()})}" class="btn btn-outline-secondary btn-sm">Workspace</a>
        </div>
    </div>
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card mb-3"><div class="card-header">Details</div><div class="card-body">
                <p class="mb-1"><small class="text-muted">Status:</small> <span th:text="${workspace.status()}"></span></p>
                <p class="mb-1"><small class="text-muted">Type:</small> <span th:text="${workspace.workspaceType()}"></span></p>
                <p class="mb-1"><small class="text-muted">Domain:</small> <span th:text="${workspace.description()}"></span></p>
                <p class="mb-0"><small class="text-muted">Stage:</small> <span th:text="${workspace.phase() != null ? workspace.phase().name().replace('_',' ') : '-'}"></span></p>
            </div></div>
        </div>
        <div class="col-md-6">
            <div class="card mb-3"><div class="card-header">Documents</div><div class="card-body">
                <p th:text="${#lists.size(documents)} + ' documents'" class="mb-0"></p>
            </div></div>
            <div class="card mb-3"><div class="card-header">Timeline</div><div class="card-body">
                <p th:text="${#lists.size(timeline)} + ' events'" class="mb-0"></p>
            </div></div>
            <div class="card mb-3"><div class="card-header">Completed Steps</div><div class="card-body">
                <ul class="mb-0 small">
                    <li th:each="step : ${steps}" th:text="${step.stepName} + ' (' + ${step.status} + ')'">Step</li>
                </ul>
            </div></div>
        </div>
    </div>
</main>
</body>
</html>
