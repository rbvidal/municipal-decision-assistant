<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{audit.title}">Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/platform.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="app-shell">
    <h1 class="h3 mb-3" th:text="#{audit.title}">Audit Viewer</h1>
    <form method="get" class="row g-2 mb-3">
        <div class="col-md-3"><select name="eventType" class="form-select"><option value="" th:text="#{audit.anyEvent}">Any event</option><option th:each="t : ${eventTypes}" th:value="${t}" th:text="${t}"></option></select></div>
        <div class="col-md-3"><input name="actorId" th:value="${form.actorId()}" class="form-control" th:placeholder="#{audit.actor}"></div>
        <div class="col-md-3"><input name="correlationId" th:value="${form.correlationId()}" class="form-control" th:placeholder="#{audit.correlationId}"></div>
        <div class="col-md-2"><button class="btn btn-secondary" type="submit" th:text="#{audit.filter}">Filter</button></div>
    </form>
    <table class="table table-sm table-striped bg-white">
        <thead><tr><th th:text="#{audit.table.time}">Time</th><th th:text="#{audit.table.type}">Type</th><th th:text="#{audit.table.actor}">Actor</th><th th:text="#{audit.table.entity}">Entity</th><th th:text="#{audit.table.correlation}">Correlation</th><th th:text="#{audit.table.request}">Request</th></tr></thead>
        <tbody>
        <tr th:each="event : ${page.events()}">
            <td th:text="${#temporals.format(event.timestamp(), 'dd.MM.yyyy HH:mm', #locale)}"></td>
            <td th:text="${event.eventType()}"></td>
            <td th:text="${event.actorId()}"></td>
            <td class="trace"><span th:text="${event.entityType()}"></span>/<span th:text="${event.entityId()}"></span></td>
            <td class="trace" th:text="${event.correlationId()}"></td>
            <td class="trace" th:text="${event.requestId()}"></td>
        </tr>
        </tbody>
    </table>
    <nav class="mt-3" th:if="${page.totalPages() > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/audit(eventType=${form.eventType()},actorId=${form.actorId()},correlationId=${form.correlationId()},page=${currentPage - 1})}" th:text="#{common.previous}">Previous</a>
            </li>
            <li class="page-item disabled"><span class="page-link" th:text="#{common.page} + ' ' + ${currentPage + 1} + ' ' + #{common.of} + ' ' + ${page.totalPages()}">Page 1 of 1</span></li>
            <li class="page-item" th:classappend="${currentPage + 1 >= page.totalPages()} ? 'disabled'">
                <a class="page-link" th:href="@{/audit(eventType=${form.eventType()},actorId=${form.actorId()},correlationId=${form.correlationId()},page=${currentPage + 1})}" th:text="#{common.next}">Next</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
