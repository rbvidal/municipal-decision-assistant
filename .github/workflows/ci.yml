name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Backend build, test, static analysis, coverage ──
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: municipal_decision_assistant
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test, verify
        run: mvn clean verify --batch-mode -Dskip.spotbugs=false
        env:
          DB_URL: jdbc:postgresql://localhost:5433/municipal_decision_assistant
          DB_USERNAME: platform
          DB_PASSWORD: platform

      - name: OWASP Dependency Check
        run: mvn dependency-check:check --batch-mode -Dowasp.skip=false || true
        continue-on-error: true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/**'

  # ── Frontend build and test ──
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Playwright E2E tests ──
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: municipal_decision_assistant
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e-tests/package-lock.json

      - name: Build backend
        run: mvn compile --batch-mode -DskipTests

      - name: Start application
        run: |
          mvn spring-boot:run -pl platform-api --batch-mode -Dspring-boot.run.profiles=dev &
          echo "Waiting for application to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/login > /dev/null 2>&1; then
              echo "Application is up!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Application failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e-tests

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: e2e-tests

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test
        working-directory: e2e-tests
        continue-on-error: true

      - name: Archive Playwright report
        if: always() && steps.playwright.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e-tests/test-results/
            e2e-tests/playwright-report/
          retention-days: 7

      - name: Archive Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e-tests/test-results/artifacts/
          retention-days: 7

      - name: Fail on test failures
        if: steps.playwright.outcome == 'failure'
        run: exit 1
