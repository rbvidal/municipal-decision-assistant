name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Backend build, test, static analysis, coverage ──
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: municipal_decision_assistant
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test, verify
        run: mvn clean verify --batch-mode -Dskip.spotbugs=false
        env:
          DB_URL: jdbc:postgresql://localhost:5433/municipal_decision_assistant
          DB_USERNAME: platform
          DB_PASSWORD: platform

      - name: OWASP Dependency Check
        run: mvn dependency-check:check --batch-mode -Dowasp.skip=false || true
        continue-on-error: true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/**'

  # ── Frontend build and test ──
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Playwright E2E tests ──
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: municipal_decision_assistant
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn compile --batch-mode

      - name: Start application
        run: |
          mvn spring-boot:run -pl platform-api --batch-mode &
          sleep 30

      - name: Run Playwright tests
        run: |
          cd e2e-tests
          npm init -y > /dev/null 2>&1
          npm install @playwright/test > /dev/null 2>&1
          npx playwright install chromium > /dev/null 2>&1
          npx playwright test
