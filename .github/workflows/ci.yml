name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: municipal_decision_assistant
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean verify --batch-mode
        env:
          DB_URL: jdbc:postgresql://localhost:5433/municipal_decision_assistant
          DB_USERNAME: platform
          DB_PASSWORD: platform

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

  ui-tests:
    name: Browser Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: municipal_decision_assistant
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn compile --batch-mode

      - name: Start application
        run: |
          mvn spring-boot:run -pl platform-api --batch-mode &
          sleep 30

      - name: Run Playwright tests
        run: |
          cd e2e-tests
          npm init -y > /dev/null 2>&1
          npm install @playwright/test > /dev/null 2>&1
          npx playwright install chromium > /dev/null 2>&1
          npx playwright test
