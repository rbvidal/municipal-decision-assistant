name: k6 Load Test Suite

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: "staging"
        options: [staging, production]
      suite:
        description: "Test suite to run"
        required: true
        type: choice
        default: "smoke"
        options: [smoke, full, ai-only, search-only]

jobs:
  # ─────────────────────────────────────────────
  # Smoke — always runs first as a gate
  # ─────────────────────────────────────────────
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: "0.49.0"

      - name: Run smoke test
        run: |
          k6 run k6-scripts/01-smoke-test.js \
            --out json=k6-results/smoke.json \
            -e BASE_URL="${{ secrets[format('{0}_BASE_URL', inputs.environment)] }}" \
            -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
            -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}"

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: k6-results/smoke.json
          retention-days: 7

  # ─────────────────────────────────────────────
  # Daily Load — baseline office workload
  # ─────────────────────────────────────────────
  daily-load:
    name: Daily Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: smoke
    if: ${{ inputs.suite == 'full' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: "0.49.0"

      - name: Run daily load test
        run: |
          k6 run k6-scripts/02-daily-load.js \
            --out json=k6-results/daily.json \
            -e BASE_URL="${{ secrets[format('{0}_BASE_URL', inputs.environment)] }}" \
            -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
            -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}"

      - name: Check thresholds
        run: |
          # Extract p95 search latency from JSON results
          P95=$(jq '.metrics["http_req_duration{name:search}"].p95 // 0' k6-results/daily.json)
          echo "Search p95: ${P95}ms"
          if (( $(echo "$P95 > 12000" | bc -l) )); then
            echo "WARNING: Search p95 exceeds 12 s threshold!"
          fi

      - name: Upload daily results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-daily-results
          path: k6-results/daily.json
          retention-days: 7

  # ─────────────────────────────────────────────
  # AI Validation — correctness, not throughput
  # ─────────────────────────────────────────────
  ai-validation:
    name: AI Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: smoke
    if: ${{ inputs.suite == 'full' || inputs.suite == 'ai-only' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: "0.49.0"

      - name: Run AI validation
        run: |
          k6 run k6-scripts/04-ai-heavy.js \
            --out json=k6-results/ai-validation.json \
            -e BASE_URL="${{ secrets[format('{0}_BASE_URL', inputs.environment)] }}" \
            -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
            -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}"

      - name: Upload AI results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-ai-results
          path: k6-results/ai-validation.json
          retention-days: 7

  # ─────────────────────────────────────────────
  # Search Intensive — Qdrant + Neo4j + PG
  # ─────────────────────────────────────────────
  search-intensive:
    name: Search Intensive
    runs-on: ubuntu-latest
    timeout-minutes: 18
    needs: smoke
    if: ${{ inputs.suite == 'full' || inputs.suite == 'search-only' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: "0.49.0"

      - name: Run search intensive test
        run: |
          k6 run k6-scripts/05-search-intensive.js \
            --out json=k6-results/search.json \
            -e BASE_URL="${{ secrets[format('{0}_BASE_URL', inputs.environment)] }}" \
            -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
            -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}"

      - name: Upload search results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-search-results
          path: k6-results/search.json
          retention-days: 7

  # ─────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [smoke, daily-load, ai-validation, search-intensive]
    if: always()
    steps:
      - name: Produce summary
        run: |
          echo "## k6 Load Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          for job in smoke daily-load ai-validation search-intensive; do
            status="${{ needs[$job].result }}"
            emoji="$([ "$status" = "success" ] && echo "✅" || echo "❌")"
            echo "| $job | $emoji $status |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts uploaded for 7 days." >> $GITHUB_STEP_SUMMARY
