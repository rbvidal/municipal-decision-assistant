name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build and publish Docker image ──
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Smoke tests against the published image ──
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: municipal_decision_assistant
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and run image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker pull $IMAGE
          docker run -d --name mda-smoke \
            -p 8080:8080 \
            -e DB_URL=jdbc:postgresql://localhost:5433/municipal_decision_assistant \
            -e DB_USERNAME=platform \
            -e DB_PASSWORD=platform \
            -e AUTH_JWT_SECRET=smoke-test-secret-that-is-at-least-32-bytes \
            $IMAGE
          sleep 20

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, waiting..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          docker logs mda-smoke
          exit 1

      - name: API smoke test
        run: |
          # Test that the API responds
          curl -s http://localhost:8080/api/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke@test.com","password":"SmokeTest123!","displayName":"Smoke Test","roles":[]}' \
            || echo "Register endpoint reached (response may vary)"

          curl -s http://localhost:8080/api/workspaces \
            || echo "Workspaces endpoint reached"

      - name: Container logs on failure
        if: failure()
        run: docker logs mda-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f mda-smoke || true
