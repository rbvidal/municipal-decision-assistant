<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="Segoe UI,Inter,system-ui,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="860" height="580" fill="#fff"/>
  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">Provider SPI Architecture</text>
  <text x="430" y="52" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">Service Provider Interfaces — Business logic depends on interfaces, never on implementations</text>

  <!-- SPIs (left column) -->
  <text x="80" y="85" font-size="13" font-weight="700" fill="#374151">SPI (Interface)</text>
  <line x1="20" y1="92" x2="220" y2="92" stroke="#D1D5DB" stroke-width="1"/>

  <rect x="20" y="102" width="200" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="120" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">ChatCompletionProvider</text>
  <text x="120" y="131" text-anchor="middle" font-size="8" fill="#6B7280">complete(prompt, caps) → String</text>

  <rect x="20" y="150" width="200" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="120" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">EmbeddingProvider</text>
  <text x="120" y="179" text-anchor="middle" font-size="8" fill="#6B7280">embed(text) → float[]</text>

  <rect x="20" y="198" width="200" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="120" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">RerankingProvider</text>
  <text x="120" y="227" text-anchor="middle" font-size="8" fill="#6B7280">rerank(query, candidates) → List</text>

  <rect x="20" y="246" width="200" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="120" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">VectorSearchProvider</text>
  <text x="120" y="275" text-anchor="middle" font-size="8" fill="#6B7280">search(query) → List</text>

  <rect x="20" y="294" width="200" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="120" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">GraphSearchProvider</text>
  <text x="120" y="323" text-anchor="middle" font-size="8" fill="#6B7280">search(query) / findRelated()</text>

  <!-- Implementations (right column) -->
  <text x="300" y="85" font-size="13" font-weight="700" fill="#374151">Implementations</text>
  <line x1="240" y1="92" x2="550" y2="92" stroke="#D1D5DB" stroke-width="1"/>

  <rect x="240" y="102" width="160" height="36" rx="6" fill="#FDF2F8" stroke="#DB2777" stroke-width="1"/>
  <text x="320" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#BE185D">OllamaChatProvider</text>
  <text x="320" y="131" text-anchor="middle" font-size="8" fill="#9CA3AF">platform.ai.ollama.base-url</text>
  <line x1="220" y1="120" x2="240" y2="120" stroke="#6B7280" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="410" y="102" width="160" height="36" rx="6" fill="#FDF2F8" stroke="#DB2777" stroke-width="1"/>
  <text x="490" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#BE185D">OpenAiChatProvider</text>
  <text x="490" y="131" text-anchor="middle" font-size="8" fill="#9CA3AF">platform.ai.openai.api-key</text>
  <line x1="220" y1="130" x2="410" y2="118" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <rect x="240" y="150" width="160" height="36" rx="6" fill="#FDF2F8" stroke="#DB2777" stroke-width="1"/>
  <text x="320" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#BE185D">OllamaEmbeddingProvider</text>
  <text x="320" y="179" text-anchor="middle" font-size="8" fill="#9CA3AF">platform.search.embedding.ollama</text>
  <line x1="220" y1="168" x2="240" y2="168" stroke="#6B7280" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="240" y="198" width="160" height="36" rx="6" fill="#FDF2F8" stroke="#DB2777" stroke-width="1"/>
  <text x="320" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="#BE185D">OllamaRerankingProvider</text>
  <text x="320" y="227" text-anchor="middle" font-size="8" fill="#9CA3AF">platform.search.embedding.ollama</text>
  <line x1="220" y1="216" x2="240" y2="216" stroke="#6B7280" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="240" y="246" width="160" height="36" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="320" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#0E7490">QdrantVectorSearchProvider</text>
  <text x="320" y="275" text-anchor="middle" font-size="8" fill="#9CA3AF">platform.search.qdrant.host</text>
  <line x1="220" y1="264" x2="240" y2="264" stroke="#6B7280" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="240" y="294" width="160" height="36" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="320" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">Neo4jGraphSearchAdapter</text>
  <text x="320" y="323" text-anchor="middle" font-size="8" fill="#9CA3AF">@ConditionalOnBean(GraphEnrichmentService)</text>
  <line x1="220" y1="312" x2="240" y2="312" stroke="#6B7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Fallbacks -->
  <text x="660" y="85" font-size="13" font-weight="700" fill="#374151">Fallbacks</text>
  <line x1="600" y1="92" x2="840" y2="92" stroke="#D1D5DB" stroke-width="1"/>

  <rect x="600" y="246" width="200" height="36" rx="6" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="700" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#6B7280">NoOpVectorSearchProvider</text>
  <text x="700" y="275" text-anchor="middle" font-size="8" fill="#9CA3AF">@ConditionalOnMissingBean</text>
  <line x1="400" y1="264" x2="600" y2="264" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="600" y="294" width="200" height="36" rx="6" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="700" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#6B7280">NoOpGraphSearchProvider</text>
  <text x="700" y="323" text-anchor="middle" font-size="8" fill="#9CA3AF">@ConditionalOnMissingBean</text>
  <line x1="400" y1="312" x2="600" y2="312" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Provider Router box -->
  <rect x="240" y="380" width="420" height="80" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">ProviderRouter</text>
  <text x="450" y="425" text-anchor="middle" font-size="11" fill="#374151">Receives List&lt;ChatCompletionProvider&gt; — all implementations auto-injected</text>
  <text x="450" y="445" text-anchor="middle" font-size="11" fill="#374151">4-tier selection: model prefix → capability → preferred → first available</text>

  <!-- Principle callout -->
  <rect x="240" y="490" width="420" height="50" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <text x="450" y="512" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Principle: AI is Infrastructure</text>
  <text x="450" y="530" text-anchor="middle" font-size="10" fill="#374151">Business logic depends on interfaces. Adding a provider requires zero changes to orchestration code.</text>
</svg>
