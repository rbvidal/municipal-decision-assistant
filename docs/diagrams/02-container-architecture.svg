<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI,Inter,system-ui,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#fff"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">Container Architecture — Enterprise AI Platform</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">C4 Level 2</text>

  <!-- Web App -->
  <rect x="40" y="160" width="220" height="280" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="150" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">Web Application</text>
  <text x="150" y="210" text-anchor="middle" font-size="10" fill="#6B7280">Spring Boot / Thymeleaf</text>
  <line x1="60" y1="225" x2="240" y2="225" stroke="#E5E7EB" stroke-width="1"/>
  <text x="150" y="245" text-anchor="middle" font-size="10" fill="#374151">Port 8080</text>
  <text x="150" y="262" text-anchor="middle" font-size="10" fill="#374151">REST Controllers</text>
  <text x="150" y="279" text-anchor="middle" font-size="10" fill="#374151">Thymeleaf Templates</text>
  <text x="150" y="296" text-anchor="middle" font-size="10" fill="#374151">SearchInfrastructureConfig</text>
  <line x1="60" y1="310" x2="240" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <text x="150" y="330" text-anchor="middle" font-size="10" fill="#374151">9 Platform Modules</text>
  <text x="150" y="347" text-anchor="middle" font-size="10" fill="#374151">Conditional Bean Wiring</text>
  <text x="150" y="364" text-anchor="middle" font-size="10" fill="#374151">Health Indicators</text>

  <!-- PostgreSQL -->
  <rect x="340" y="100" width="170" height="80" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="425" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">PostgreSQL</text>
  <text x="425" y="148" text-anchor="middle" font-size="10" fill="#6B7280">pgvector/pg16</text>
  <text x="425" y="163" text-anchor="middle" font-size="10" fill="#6B7280">Port 5433</text>
  <line x1="260" y1="250" x2="340" y2="140" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Qdrant -->
  <rect x="340" y="220" width="170" height="70" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="425" y="247" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">Qdrant</text>
  <text x="425" y="265" text-anchor="middle" font-size="10" fill="#6B7280">Vector Database — Ports 6333/6334</text>
  <line x1="260" y1="280" x2="340" y2="255" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Neo4j -->
  <rect x="340" y="330" width="170" height="70" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="425" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">Neo4j</text>
  <text x="425" y="375" text-anchor="middle" font-size="10" fill="#6B7280">Graph Database — Ports 7474/7687</text>
  <line x1="260" y1="330" x2="340" y2="365" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- LLM -->
  <rect x="340" y="440" width="170" height="60" rx="8" fill="#FDF2F8" stroke="#DB2777" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="425" y="465" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">Ollama / OpenAI</text>
  <text x="425" y="483" text-anchor="middle" font-size="10" fill="#6B7280">LLM + Embeddings — Port 11434</text>
  <line x1="260" y1="310" x2="340" y2="470" stroke="#DB2777" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Internal Modules -->
  <rect x="580" y="80" width="280" height="140" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="720" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Platform Modules (JARs)</text>
  <line x1="600" y1="115" x2="840" y2="115" stroke="#D1D5DB" stroke-width="1"/>
  <text x="600" y="137" font-size="10" fill="#374151">platform-ai</text>
  <text x="600" y="152" font-size="10" fill="#374151">platform-search</text>
  <text x="600" y="167" font-size="10" fill="#374151">platform-document</text>
  <text x="600" y="182" font-size="10" fill="#374151">platform-neo4j</text>
  <text x="600" y="197" font-size="10" fill="#374151">platform-workspace</text>
  <text x="780" y="137" font-size="10" fill="#374151">platform-auth</text>
  <text x="780" y="152" font-size="10" fill="#374151">platform-audit</text>
  <text x="780" y="167" font-size="10" fill="#374151">platform-observability</text>
  <text x="780" y="182" font-size="10" fill="#374151">platform-api</text>

  <rect x="580" y="250" width="280" height="80" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="720" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Externalized Config</text>
  <line x1="600" y1="285" x2="840" y2="285" stroke="#D1D5DB" stroke-width="1"/>
  <text x="600" y="305" font-size="10" fill="#374151">application.yml / env vars</text>
  <text x="600" y="320" font-size="10" fill="#374151">@ConfigurationProperties (platform.*)</text>

  <!-- Legend -->
  <rect x="580" y="360" width="280" height="65" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="380" font-size="11" font-weight="600" fill="#1F2937">Legend</text>
  <rect x="600" y="392" width="12" height="12" rx="2" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="618" y="402" font-size="10" fill="#6B7280">Required infrastructure</text>
  <rect x="600" y="410" width="12" height="12" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="618" y="420" font-size="10" fill="#6B7280">Optional infrastructure</text>
</svg>
